<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP WAM Builder Prototype</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PRESET DEFINITIONS ---
        const presets = {
            tier1: {
                name: "Tier 1: Foundational Persona",
                desc: "AI strictly prohibited. Assessment focuses on manual syntax proficiency and basic logic.",
                data: [
                    { id: 1, component: 'Basic Syntax & Typing', tooling: 'Student Only', granularity: 'Line-Level', evidence: 'E1 (Weak)', weight: 40 },
                    { id: 2, component: 'Algorithm Logic', tooling: 'Student Only', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 40 },
                    { id: 3, component: 'Code Comments/Style', tooling: 'Student Only', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 20 }
                ]
            },
            tier2: {
                name: "Tier 2: Hybrid Persona",
                desc: "AI as Junior Assistant. Assessment balances manual logic design with AI-assisted boilerplate.",
                data: [
                    { id: 1, component: 'Algorithm Design', tooling: 'Student Only', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 40 },
                    { id: 2, component: 'Implementation/Boilerplate', tooling: 'Hybrid / Co-Pilot', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 20 },
                    { id: 3, component: 'Testing & Integration', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 30 },
                    { id: 4, component: 'Documentation', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'Provenance Label (Y/N)', weight: 10 }
                ]
            },
            tier3: {
                name: "Tier 3: Architectural Persona",
                desc: "AI as Implementer. Assessment focuses on system design, verification, and auditing.",
                data: [
                    { id: 1, component: 'System Architecture', tooling: 'Student Only', granularity: 'Diagram-Level', evidence: 'E3 (Strong)', weight: 40 },
                    { id: 2, component: 'Core Logic', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 30 },
                    { id: 3, component: 'Syntax/Boilerplate', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 10 },
                    { id: 4, component: 'Documentation', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'Provenance Label (Y/N)', weight: 5 },
                    { id: 5, component: 'Debugging', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 15 }
                ]
            },
            tier4: {
                name: "Tier 4: Frontier (Newton Protocol)",
                desc: "Standing on the shoulders of giants. Grading based on the 'Delta' beyond AI baseline.",
                data: [
                    { id: 1, component: 'AI Baseline Replication', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'E1 (Weak)', weight: 5 },
                    { id: 2, component: 'Technical Delta (Added Complexity)', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E3 (Strong)', weight: 40 },
                    { id: 3, component: 'Orchestration Quality (Prompting)', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E3 (Strong)', weight: 20 },
                    { id: 4, component: 'Acceptance Criteria & Verification', tooling: 'Student Only', granularity: 'Diagram-Level', evidence: 'E4 (Live Contextual)', weight: 35 }
                ]
            }
        };

        function WAMBuilder() {
            // State
            const [activePreset, setActivePreset] = useState('tier3');
            const [rows, setRows] = useState(JSON.parse(JSON.stringify(presets.tier3.data)));

            // Dropdown Options
            const toolingOptions = ['Student Only', 'Hybrid / Co-Pilot', 'AI Allowed'];
            const evidenceOptions = ['E1 (Weak)', 'E2 (Moderate)', 'E3 (Strong)', 'E4 (Live Contextual)', 'Provenance Label (Y/N)'];
            const granularityOptions = ['Assignment-Level', 'File-Level', 'Diagram-Level', 'Function-Level', 'Line-Level'];

            // Handlers
            const updateRow = (id, field, value) => {
                setRows(rows.map(row => row.id === id ? { ...row, [field]: value } : row));
            };

            const applyPreset = (presetKey) => {
                setActivePreset(presetKey);
                // Deep copy to prevent mutating the original preset object
                setRows(JSON.parse(JSON.stringify(presets[presetKey].data)));
            };

            // --- THE LOGIC ENGINE (Constructive Alignment Checker) ---
            const getRowErrors = (row) => {
                let errors = [];
                const weight = Number(row.weight);
                const isAIPermitted = row.tooling === 'AI Allowed' || row.tooling === 'Hybrid / Co-Pilot';
                const isWeakEvidence = row.evidence.includes('E1') || row.evidence.includes('Provenance');
                const isStrongEvidence = row.evidence.includes('E3') || row.evidence.includes('E4');

                // Rule 1: The Free-Rider Loophole
                if (weight >= 25 && isAIPermitted && isWeakEvidence) {
                    errors.push("Security Risk: High-weight tasks allowing AI must require >= E2 (Moderate) evidence.");
                }

                // Rule 2: The Surveillance Trap
                if (weight <= 10 && isStrongEvidence) {
                    errors.push("HCI Warning: Strong evidence for a low-weight task creates unnecessary friction. Consider E1.");
                }
                
                // Rule 3: Manual Labor Misalignment
                if ((row.component.includes('Syntax') || row.component.includes('Boilerplate')) && weight > 20 && isAIPermitted) {
                    errors.push("Pedagogy Warning: If syntax is weighted heavily (>20%), tooling should be 'Student Only'.");
                }

                return errors;
            };

            const totalWeight = rows.reduce((sum, row) => sum + Number(row.weight), 0);

            return (
                <div className="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-xl">
                    <div className="border-b pb-4 mb-6">
                        <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Dynamic Assessment Protocol (DAP)</h1>
                        <p className="text-gray-600 text-lg">Instructor Matrix Builder: Align permitted AI tooling with evidence and grading weight.</p>
                    </div>

                    {/* Preset Selector UI */}
                    <div className="mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">1. Select Pedagogical Preset</h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            {Object.keys(presets).map(key => (
                                <button 
                                    key={key}
                                    onClick={() => applyPreset(key)}
                                    className={`p-3 rounded-md text-left transition-all duration-200 border-2 ${activePreset === key ? 'border-blue-600 bg-blue-50 shadow-sm' : 'border-transparent bg-white shadow hover:bg-gray-100 hover:border-gray-300'}`}
                                >
                                    <div className={`font-bold ${activePreset === key ? 'text-blue-700' : 'text-gray-800'}`}>{presets[key].name}</div>
                                    <div className="text-xs text-gray-500 mt-1 leading-tight">{presets[key].desc}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    {/* Matrix Editor UI */}
                    <div className="mb-4 flex justify-between items-end">
                        <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider">2. Customize Weighted Authorship Matrix (WAM)</h2>
                        <span className="text-xs text-blue-600 font-semibold bg-blue-100 px-2 py-1 rounded">Live Logic Engine Active</span>
                    </div>

                    <div className="overflow-x-auto shadow-sm border border-gray-200 rounded-lg mb-6">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100 text-gray-700 text-xs uppercase tracking-wider">
                                    <th className="p-4 border-b">Component of Work</th>
                                    <th className="p-4 border-b">Permitted Tooling</th>
                                    <th className="p-4 border-b">Disclosure Granularity</th>
                                    <th className="p-4 border-b">Evidence Required</th>
                                    <th className="p-4 border-b w-24 text-center">Weight (%)</th>
                                    <th className="p-4 border-b w-64">System Warnings</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white">
                                {rows.map((row) => {
                                    const errors = getRowErrors(row);
                                    return (
                                        <tr key={row.id} className="border-b hover:bg-blue-50 transition-colors">
                                            <td className="p-3 border-r border-gray-100">
                                                <input type="text" value={row.component} 
                                                    onChange={(e) => updateRow(row.id, 'component', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-medium text-gray-800" />
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.tooling} onChange={(e) => updateRow(row.id, 'tooling', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                                    {toolingOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.granularity} onChange={(e) => updateRow(row.id, 'granularity', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                                    {granularityOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.evidence} onChange={(e) => updateRow(row.id, 'evidence', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                                    {evidenceOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <input type="number" value={row.weight} 
                                                    onChange={(e) => updateRow(row.id, 'weight', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded text-center font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                                            </td>
                                            <td className="p-3 text-sm bg-gray-50">
                                                {errors.length === 0 ? 
                                                    <span className="text-green-600 font-semibold flex items-center"><svg className="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"></path></svg> Valid Alignment</span> : 
                                                    <div className="text-red-600 font-medium">
                                                        {errors.map((err, i) => <p key={i} className="mb-1 text-xs flex items-start"><span className="mr-1">⚠</span>{err}</p>)}
                                                    </div>
                                                }
                                            </td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>

                    <div className="flex justify-between items-center bg-gray-800 p-5 rounded-lg shadow-inner">
                        <div className="text-xl font-bold text-white">
                            Total Assessment Weight: 
                            <span className={totalWeight === 100 ? "text-green-400 ml-3" : "text-red-400 ml-3"}>
                                {totalWeight}%
                            </span>
                            {totalWeight !== 100 && <span className="text-sm font-normal text-gray-400 ml-3">(Must equal 100%)</span>}
                        </div>
                        <button 
                            className={`px-8 py-3 rounded-md text-white font-bold tracking-wide transition-all ${totalWeight === 100 && rows.every(r => getRowErrors(r).length === 0) ? 'bg-blue-600 hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-gray-600 cursor-not-allowed opacity-50'}`}
                        >
                            Publish WAM to Syllabus
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WAMBuilder />);
    </script>
</body>
</html>
