<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP WAM Builder Prototype</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- VALID PRESETS (Tiers 1-4) ---
        const presets = {
            tier1: {
                name: "Tier 1: Foundational",
                desc: "AI prohibited. Focus on manual syntax.",
                data: [
                    { id: 1, component: 'Basic Syntax & Typing', tooling: 'Student Only', granularity: 'Line-Level', evidence: 'E1 (Weak)', weight: 40 },
                    { id: 2, component: 'Algorithm Logic', tooling: 'Student Only', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 40 },
                    { id: 3, component: 'Code Comments/Style', tooling: 'Student Only', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 20 }
                ]
            },
            tier2: {
                name: "Tier 2: Hybrid",
                desc: "AI as Junior Assistant. Balance manual logic with AI boilerplate.",
                data: [
                    { id: 1, component: 'Algorithm Design', tooling: 'Student Only', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 40 },
                    { id: 2, component: 'Implementation/Boilerplate', tooling: 'Hybrid / Co-Pilot', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 20 },
                    { id: 3, component: 'Testing & Integration', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 30 },
                    { id: 4, component: 'Documentation', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'Provenance Label (Y/N)', weight: 10 }
                ]
            },
            tier3: {
                name: "Tier 3: Architectural",
                desc: "AI as Implementer. Focus on outcome verification.",
                data: [
                    { id: 1, component: 'System Architecture', tooling: 'Student Only', granularity: 'Diagram-Level', evidence: 'E3 (Strong)', weight: 40 },
                    { id: 2, component: 'Core Logic', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 30 },
                    { id: 3, component: 'Syntax/Boilerplate', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 10 },
                    { id: 4, component: 'Documentation', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'Provenance Label (Y/N)', weight: 5 },
                    { id: 5, component: 'Debugging', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 15 }
                ]
            },
            tier4: {
                name: "Tier 4: Frontier (Newton)",
                desc: "Grade the 'Delta' beyond the AI baseline.",
                data: [
                    { id: 1, component: 'AI Baseline Replication', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'E1 (Weak)', weight: 5 },
                    { id: 2, component: 'Technical Delta (Added Complexity)', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E3 (Strong)', weight: 40 },
                    { id: 3, component: 'Orchestration Quality (Prompting)', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E3 (Strong)', weight: 20 },
                    { id: 4, component: 'Acceptance Criteria & Verification', tooling: 'Student Only', granularity: 'Diagram-Level', evidence: 'E4 (Live Contextual)', weight: 35 }
                ]
            }
        };

        // --- ANTI-PATTERN PRESETS (The "Crash Test") ---
        const errorCases = {
            err1: { name: "Anti-Pattern 1: The Free-Rider", desc: "High weight, AI allowed, weak proof.", data: [
                { id: 1, component: 'Core Logic Construction', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 50 },
                { id: 2, component: 'Other Tasks', tooling: 'Student Only', granularity: 'Assignment-Level', evidence: 'E1 (Weak)', weight: 50 }
            ]},
            err2: { name: "Anti-Pattern 2: Surveillance Trap", desc: "Low weight task demanding extreme proof.", data: [
                { id: 1, component: 'Write Basic Code Comments', tooling: 'Student Only', granularity: 'Function-Level', evidence: 'E4 (Live Contextual)', weight: 5 },
                { id: 2, component: 'Core Logic', tooling: 'Student Only', granularity: 'Assignment-Level', evidence: 'E2 (Moderate)', weight: 95 }
            ]},
            err3: { name: "Anti-Pattern 3: Labor Misalignment", desc: "Massive points for watching an AI type.", data: [
                { id: 1, component: 'Syntax/Boilerplate Typing', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E2 (Moderate)', weight: 45 },
                { id: 2, component: 'System Testing', tooling: 'Student Only', granularity: 'Assignment-Level', evidence: 'E2 (Moderate)', weight: 55 }
            ]},
            err4: { name: "Anti-Pattern 4: Granularity Mismatch", desc: "Microscopic tracking for a macro task.", data: [
                { id: 1, component: 'Macro System Architecture', tooling: 'Hybrid / Co-Pilot', granularity: 'Line-Level', evidence: 'E3 (Strong)', weight: 50 },
                { id: 2, component: 'Implementation', tooling: 'Student Only', granularity: 'Assignment-Level', evidence: 'E1 (Weak)', weight: 50 }
            ]}
        };

        function WAMBuilder() {
            const [activePreset, setActivePreset] = useState('tier3');
            const [rows, setRows] = useState(JSON.parse(JSON.stringify(presets.tier3.data)));

            const toolingOptions = ['Student Only', 'Hybrid / Co-Pilot', 'AI Allowed'];
            const evidenceOptions = ['E1 (Weak)', 'E2 (Moderate)', 'E3 (Strong)', 'E4 (Live Contextual)', 'Provenance Label (Y/N)'];
            const granularityOptions = ['Assignment-Level', 'File-Level', 'Diagram-Level', 'Function-Level', 'Line-Level'];

            const updateRow = (id, field, value) => {
                setRows(rows.map(row => row.id === id ? { ...row, [field]: value } : row));
            };

            const applyPreset = (presetKey, isErrorCase = false) => {
                setActivePreset(presetKey);
                const sourceData = isErrorCase ? errorCases[presetKey].data : presets[presetKey].data;
                setRows(JSON.parse(JSON.stringify(sourceData)));
            };

            // --- THE 4 GEARS: THE LOGIC ENGINE ---
            const getRowErrors = (row) => {
                let errors = [];
                const weight = Number(row.weight);
                const isAIPermitted = row.tooling === 'AI Allowed' || row.tooling === 'Hybrid / Co-Pilot';
                const isWeakEvidence = row.evidence.includes('E1') || row.evidence.includes('Provenance');
                const isStrongEvidence = row.evidence.includes('E3') || row.evidence.includes('E4');
                const compLower = row.component.toLowerCase();

                // Gear 1: Integrity (The Free-Rider)
                if (weight >= 25 && isAIPermitted && isWeakEvidence) {
                    errors.push("Security Risk (Gear 1): High-weight tasks allowing AI must require >= E2 (Moderate) evidence. Otherwise, students get credit for AI labor.");
                }

                // Gear 2: Usability (The Surveillance Trap)
                if (weight <= 10 && isStrongEvidence) {
                    errors.push("HCI Warning (Gear 2): Strong evidence for a low-weight task creates 'False Difficulty' (Friction). Downgrade to E1.");
                }
                
                // Gear 3: Pedagogy (Manual Labor Misalignment)
                if ((compLower.includes('syntax') || compLower.includes('boilerplate')) && weight > 20 && isAIPermitted) {
                    errors.push("Pedagogy Warning (Gear 3): If you give >20% weight to syntax, tooling must be 'Student Only'. You cannot grade the AI's ability to type.");
                }

                // Gear 4: Workflow (Granularity Mismatch)
                if (compLower.includes('architecture') && row.granularity === 'Line-Level') {
                    errors.push("Workflow Error (Gear 4): 'Line-Level' disclosure for 'Macro Architecture' creates a Transparency Paradox. Change to Diagram-Level.");
                }

                return errors;
            };

            const totalWeight = rows.reduce((sum, row) => sum + Number(row.weight), 0);

            return (
                <div className="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-xl">
                    <div className="border-b pb-4 mb-6">
                        <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Dynamic Assessment Protocol (DAP)</h1>
                        <p className="text-gray-600 text-lg">Instructor Matrix Builder: Align permitted AI tooling with evidence and grading weight.</p>
                    </div>

                    {/* Valid Presets */}
                    <div className="mb-4 bg-blue-50 p-4 rounded-lg border border-blue-200">
                        <h2 className="text-sm font-bold text-blue-800 uppercase tracking-wider mb-3">1. Build a Valid Matrix (Pedagogical Presets)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            {Object.keys(presets).map(key => (
                                <button key={key} onClick={() => applyPreset(key, false)}
                                    className={`p-3 rounded-md text-left transition-all duration-200 border-2 ${activePreset === key ? 'border-blue-600 bg-white shadow-md' : 'border-transparent bg-white shadow hover:border-blue-300'}`}>
                                    <div className="font-bold text-blue-700 text-sm">{presets[key].name}</div>
                                    <div className="text-xs text-gray-600 mt-1 leading-tight">{presets[key].desc}</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Anti-Pattern Presets (The "Crash Test") */}
                    <div className="mb-8 bg-red-50 p-4 rounded-lg border border-red-200">
                        <h2 className="text-sm font-bold text-red-800 uppercase tracking-wider mb-3">2. Stress Test the Logic Engine (Inject Anti-Patterns)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            {Object.keys(errorCases).map(key => (
                                <button key={key} onClick={() => applyPreset(key, true)}
                                    className={`p-3 rounded-md text-left transition-all duration-200 border-2 ${activePreset === key ? 'border-red-600 bg-white shadow-md' : 'border-red-100 bg-white shadow hover:border-red-400'}`}>
                                    <div className="font-bold text-red-700 text-sm">{errorCases[key].name}</div>
                                    <div className="text-xs text-gray-600 mt-1 leading-tight">{errorCases[key].desc}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    {/* Matrix Editor UI */}
                    <div className="mb-4 flex justify-between items-end">
                        <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider">3. Live Logic Matrix</h2>
                        <span className="text-xs text-blue-600 font-semibold bg-blue-100 px-2 py-1 rounded animate-pulse">Logic Engine Active</span>
                    </div>

                    <div className="overflow-x-auto shadow-sm border border-gray-200 rounded-lg mb-6">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100 text-gray-700 text-xs uppercase tracking-wider">
                                    <th className="p-4 border-b">Component of Work</th>
                                    <th className="p-4 border-b">Tooling</th>
                                    <th className="p-4 border-b">Granularity</th>
                                    <th className="p-4 border-b">Evidence Required</th>
                                    <th className="p-4 border-b w-20 text-center">Weight</th>
                                    <th className="p-4 border-b w-80">System Warnings</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white">
                                {rows.map((row) => {
                                    const errors = getRowErrors(row);
                                    return (
                                        <tr key={row.id} className={`border-b transition-colors ${errors.length > 0 ? 'bg-red-50/50' : 'hover:bg-blue-50'}`}>
                                            <td className="p-3 border-r border-gray-100">
                                                <input type="text" value={row.component} onChange={(e) => updateRow(row.id, 'component', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 text-sm font-medium text-gray-800" />
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.tooling} onChange={(e) => updateRow(row.id, 'tooling', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded text-sm bg-white">
                                                    {toolingOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.granularity} onChange={(e) => updateRow(row.id, 'granularity', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded text-sm bg-white">
                                                    {granularityOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <select value={row.evidence} onChange={(e) => updateRow(row.id, 'evidence', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded text-sm bg-white">
                                                    {evidenceOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border-r border-gray-100">
                                                <input type="number" value={row.weight} onChange={(e) => updateRow(row.id, 'weight', e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded text-center font-bold text-sm" />
                                            </td>
                                            <td className="p-3 text-sm">
                                                {errors.length === 0 ? 
                                                    <span className="text-green-600 font-semibold flex items-center text-xs"><svg className="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"></path></svg> Valid Alignment</span> : 
                                                    <div className="text-red-700 font-bold bg-red-100 p-2 rounded">
                                                        {errors.map((err, i) => <p key={i} className="text-xs flex items-start leading-tight"><span className="mr-1">🚨</span>{err}</p>)}
                                                    </div>
                                                }
                                            </td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>

                    <div className="flex justify-between items-center bg-gray-800 p-5 rounded-lg shadow-inner">
                        <div className="text-xl font-bold text-white">
                            Total Assessment Weight: 
                            <span className={totalWeight === 100 ? "text-green-400 ml-3" : "text-red-400 ml-3"}>{totalWeight}%</span>
                        </div>
                        <button className={`px-8 py-3 rounded-md text-white font-bold transition-all ${totalWeight === 100 && rows.every(r => getRowErrors(r).length === 0) ? 'bg-blue-600 hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-gray-600 cursor-not-allowed opacity-50'}`}>
                            Publish WAM to Syllabus
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WAMBuilder />);
    </script>
</body>
</html>
