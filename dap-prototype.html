<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP WAM Builder Prototype</title>
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function WAMBuilder() {
            // Default starting state matching the Thesis Proposal (Tier 3: Architectural)
            const [rows, setRows] = useState([
                { id: 1, component: 'System Architecture', tooling: 'Student Only', granularity: 'Diagram-Level', evidence: 'E3 (Strong)', weight: 40 },
                { id: 2, component: 'Core Logic', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 30 },
                { id: 3, component: 'Syntax/Boilerplate', tooling: 'AI Allowed', granularity: 'File-Level', evidence: 'E1 (Weak)', weight: 10 },
                { id: 4, component: 'Documentation', tooling: 'AI Allowed', granularity: 'Assignment-Level', evidence: 'Provenance Label (Y/N)', weight: 5 },
                { id: 5, component: 'Debugging', tooling: 'Hybrid / Co-Pilot', granularity: 'Function-Level', evidence: 'E2 (Moderate)', weight: 15 }
            ]);

            // Options for dropdowns
            const toolingOptions = ['Student Only', 'Hybrid / Co-Pilot', 'AI Allowed'];
            const evidenceOptions = ['E1 (Weak)', 'E2 (Moderate)', 'E3 (Strong)', 'Provenance Label (Y/N)'];
            const granularityOptions = ['Assignment-Level', 'File-Level', 'Diagram-Level', 'Function-Level', 'Line-Level'];

            // Function to update a row
            const updateRow = (id, field, value) => {
                setRows(rows.map(row => row.id === id ? { ...row, [field]: value } : row));
            };

            // --- THE LOGIC ENGINE (Constructive Alignment Checker) ---
            const getRowErrors = (row) => {
                let errors = [];
                const weight = Number(row.weight);
                const isAIPermitted = row.tooling === 'AI Allowed' || row.tooling === 'Hybrid / Co-Pilot';
                const isWeakEvidence = row.evidence.includes('E1') || row.evidence.includes('Provenance');
                const isStrongEvidence = row.evidence.includes('E3');

                // Rule 1: The Free-Rider Loophole (High Weight + AI Allowed + Weak Evidence)
                if (weight >= 25 && isAIPermitted && isWeakEvidence) {
                    errors.push("Security Risk: High-weight tasks allowing AI must require at least E2 (Moderate) evidence.");
                }

                // Rule 2: The Surveillance Trap (Low Weight + Strong Evidence)
                if (weight <= 10 && isStrongEvidence) {
                    errors.push("HCI Warning: E3 evidence for a low-weight task creates unnecessary friction. Consider E1 or Provenance Label.");
                }
                
                // Rule 3: Component Mismatch (Manual typing shouldn't be high weight in Tier 3)
                if (row.component.includes('Syntax') && weight > 20) {
                    errors.push("Pedagogy Warning: In an Architectural Persona (Tier 3), Syntax should not exceed 20% weight.");
                }

                return errors;
            };

            const totalWeight = rows.reduce((sum, row) => sum + Number(row.weight), 0);

            return (
                <div className="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-lg">
                    <h1 className="text-2xl font-bold mb-2 text-gray-800">Dynamic Assessment Protocol (DAP)</h1>
                    <p className="text-gray-600 mb-6">Instructor Matrix Builder: Configure constructive alignment and prevent AI assessment gaps. <span className="font-bold text-blue-600">Preset: Tier 3 (Architectural Persona)</span></p>
                    
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100 text-gray-700 text-sm uppercase">
                                    <th className="p-3 border">Component of Work</th>
                                    <th className="p-3 border">Permitted Tooling</th>
                                    <th className="p-3 border">Granularity</th>
                                    <th className="p-3 border">Evidence Required</th>
                                    <th className="p-3 border w-24">Weight (%)</th>
                                    <th className="p-3 border w-64">System Warnings</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((row) => {
                                    const errors = getRowErrors(row);
                                    return (
                                        <tr key={row.id} className="border-b hover:bg-gray-50">
                                            <td className="p-3 border font-medium text-gray-800">
                                                <input type="text" value={row.component} 
                                                    onChange={(e) => updateRow(row.id, 'component', e.target.value)}
                                                    className="w-full p-2 border rounded" />
                                            </td>
                                            <td className="p-3 border">
                                                <select value={row.tooling} onChange={(e) => updateRow(row.id, 'tooling', e.target.value)}
                                                    className="w-full p-2 border rounded bg-white">
                                                    {toolingOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border">
                                                <select value={row.granularity} onChange={(e) => updateRow(row.id, 'granularity', e.target.value)}
                                                    className="w-full p-2 border rounded bg-white">
                                                    {granularityOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border">
                                                <select value={row.evidence} onChange={(e) => updateRow(row.id, 'evidence', e.target.value)}
                                                    className="w-full p-2 border rounded bg-white">
                                                    {evidenceOptions.map(opt => <option key={opt}>{opt}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-3 border">
                                                <input type="number" value={row.weight} 
                                                    onChange={(e) => updateRow(row.id, 'weight', e.target.value)}
                                                    className="w-full p-2 border rounded text-center" />
                                            </td>
                                            <td className="p-3 border text-sm">
                                                {errors.length === 0 ? 
                                                    <span className="text-green-600 font-bold">✓ Valid Alignment</span> : 
                                                    <div className="text-red-600 font-medium">
                                                        {errors.map((err, i) => <p key={i} className="mb-1">⚠ {err}</p>)}
                                                    </div>
                                                }
                                            </td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>

                    <div className="mt-6 flex justify-between items-center bg-gray-100 p-4 rounded">
                        <div className="text-lg font-bold">
                            Total Assessment Weight: 
                            <span className={totalWeight === 100 ? "text-green-600 ml-2" : "text-red-600 ml-2"}>
                                {totalWeight}%
                            </span>
                        </div>
                        <button 
                            className={`px-6 py-2 rounded text-white font-bold transition-colors ${totalWeight === 100 && rows.every(r => getRowErrors(r).length === 0) ? 'bg-blue-600 hover:bg-blue-700 shadow-md' : 'bg-gray-400 cursor-not-allowed opacity-70'}`}
                        >
                            Publish WAM to Students
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WAMBuilder />);
    </script>
</body>
</html>
